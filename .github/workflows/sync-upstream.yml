name: Sync Upstream

on:
  schedule:
    # 每天 UTC 22:00 同步一次上游
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '强制同步（使用 force push 覆盖本地分支）'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

env:
  UPSTREAM_REPO: https://github.com/Wei-Shaw/sub2api.git
  UPSTREAM_TAG_BASELINE: v0.1.133
  LOCAL_RELEASE_SUFFIX: local.1

jobs:
  sync-branch:
    name: 同步上游默认分支
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream "${UPSTREAM_REPO}"
          git remote -v

      - name: Fetch upstream
        run: |
          git fetch upstream --prune

      - name: Sync default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          FORCE_SYNC: ${{ github.event.inputs.force }}
        run: |
          set -e
          echo "默认分支: ${DEFAULT_BRANCH}"

          # 检查上游是否有该分支
          if ! git show-ref --verify --quiet "refs/remotes/upstream/${DEFAULT_BRANCH}"; then
            echo "上游不存在分支 ${DEFAULT_BRANCH}，跳过分支同步"
            exit 0
          fi

          git checkout "${DEFAULT_BRANCH}"

          UPSTREAM_SHA=$(git rev-parse "upstream/${DEFAULT_BRANCH}")
          LOCAL_SHA=$(git rev-parse "${DEFAULT_BRANCH}")
          echo "本地: ${LOCAL_SHA}"
          echo "上游: ${UPSTREAM_SHA}"

          if [ "${LOCAL_SHA}" = "${UPSTREAM_SHA}" ]; then
            echo "本地分支已经与上游同步，无需操作"
            exit 0
          fi

          if [ "${FORCE_SYNC}" = "true" ]; then
            echo "强制同步：使用 reset --hard 并 force push"
            git reset --hard "upstream/${DEFAULT_BRANCH}"
            git push --force-with-lease origin "${DEFAULT_BRANCH}"
          else
            # 本项目维护提交会让分支长期领先上游，因此允许无冲突 merge。
            if git merge --no-edit "upstream/${DEFAULT_BRANCH}"; then
              echo "上游分支合并成功"
              git push origin "${DEFAULT_BRANCH}"
            else
              VERSION_FILE="backend/cmd/server/VERSION"
              if git diff --name-only --diff-filter=U | grep -Fxq "${VERSION_FILE}"; then
                echo "检测到 ${VERSION_FILE} 冲突，采用上游版本"
                git checkout --theirs "${VERSION_FILE}"
                git add "${VERSION_FILE}"
              fi

              if [ -n "$(git diff --name-only --diff-filter=U)" ]; then
                echo "::warning::无法自动合并上游分支，仍存在非 VERSION 文件冲突。如需强制覆盖请手动触发并启用 force 选项。"
                git diff --name-only --diff-filter=U
                exit 1
              fi

              git commit --no-edit
              echo "上游分支合并成功，VERSION 冲突已采用上游版本"
              git push origin "${DEFAULT_BRANCH}"
            fi
          fi

  sync-tags:
    name: 为上游新 Tag 创建本项目维护版
    runs-on: ubuntu-latest
    needs: sync-branch
    if: needs.sync-branch.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream "${UPSTREAM_REPO}"

      - name: Fetch upstream tags
        run: |
          git checkout "${{ github.event.repository.default_branch }}"
          git pull --ff-only origin "${{ github.event.repository.default_branch }}"
          git fetch upstream --tags --prune --force

      - name: Create local maintenance release tags
        id: local_tags
        run: |
          set -euo pipefail
          version_gt() {
            local left="${1#v}"
            local right="${2#v}"
            IFS=. read -r left_major left_minor left_patch <<< "$left"
            IFS=. read -r right_major right_minor right_patch <<< "$right"
            for part in major minor patch; do
              local left_value="left_${part}"
              local right_value="right_${part}"
              if [ "${!left_value}" -gt "${!right_value}" ]; then
                return 0
              fi
              if [ "${!left_value}" -lt "${!right_value}" ]; then
                return 1
              fi
            done
            return 1
          }

          if [[ ! "${UPSTREAM_TAG_BASELINE}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::UPSTREAM_TAG_BASELINE 必须是 vX.Y.Z 格式: ${UPSTREAM_TAG_BASELINE}"
            exit 1
          fi
          if [[ ! "${LOCAL_RELEASE_SUFFIX}" =~ ^local\.[1-9][0-9]*$ ]]; then
            echo "::error::LOCAL_RELEASE_SUFFIX 必须是 local.N 格式且 N >= 1: ${LOCAL_RELEASE_SUFFIX}"
            exit 1
          fi

          mapfile -t UPSTREAM_TAGS < <(
            git ls-remote --tags upstream |
              awk '{print $2}' |
              sed 's|refs/tags/||' |
              grep -v '\^{}$' |
              grep -E '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$' |
              sort -V
          )

          CREATED_TAGS=()
          for upstream_tag in "${UPSTREAM_TAGS[@]}"; do
            if ! version_gt "$upstream_tag" "${UPSTREAM_TAG_BASELINE}"; then
              echo "忽略基线及历史上游 tag: $upstream_tag"
              continue
            fi

            local_tag="${upstream_tag}-${LOCAL_RELEASE_SUFFIX}"
            if [[ ! "$local_tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)-local\.[1-9][0-9]*$ ]]; then
              echo "::error::生成的本项目维护 tag 非法: $local_tag"
              exit 1
            fi
            if git ls-remote --exit-code --tags origin "refs/tags/${local_tag}" >/dev/null 2>&1; then
              echo "本项目维护 tag 已存在，跳过: $local_tag"
              continue
            fi

            git tag -a "$local_tag" HEAD -m "Release ${local_tag} based on upstream ${upstream_tag}"
            git push origin "refs/tags/${local_tag}:refs/tags/${local_tag}"
            CREATED_TAGS+=("$local_tag")
            echo "已创建本项目维护 tag: $local_tag"
          done

          if [ "${#CREATED_TAGS[@]}" -eq 0 ]; then
            echo "没有需要创建的本项目维护 tag"
            echo "created_tags=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "created_tags<<EOF"
            printf '%s\n' "${CREATED_TAGS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Dispatch release workflows
        if: steps.local_tags.outputs.created_tags != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CREATED_TAGS: ${{ steps.local_tags.outputs.created_tags }}
        run: |
          set -e
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "触发 release workflow: $tag"
            gh workflow run release.yml --repo "${GITHUB_REPOSITORY}" --ref "$tag" -f tag="$tag"
          done <<< "$CREATED_TAGS"

      - name: Summary
        run: |
          echo "✅ 上游同步完成"
          echo "上游仓库: ${UPSTREAM_REPO}"
          echo "上游 tag 基线: ${UPSTREAM_TAG_BASELINE}"
